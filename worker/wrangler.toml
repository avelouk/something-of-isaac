# Cloudflare Worker + Durable Object for daily unique-player counts.
# Deploy from repo root: npm run deploy:stats (after npx wrangler login).
# See README "Daily stats" and worker/README.md.

name = "something-of-isaac-stats"
main = "src/index.ts"
compatibility_date = "2024-11-01"

[[durable_objects.bindings]]
name = "DAILY_STATS"
class_name = "DailyRoom"

# Workers Free plan: only SQLite-backed Durable Objects (not legacy key-value `new_classes`).
[[migrations]]
tag = "v1"
new_sqlite_classes = ["DailyRoom"]

# Daily schedule (itemId + hints per UTC date) — single source of truth. Create once with:
#   npx wrangler kv namespace create SCHEDULE_KV --config worker/wrangler.toml
# then paste the returned id below. Seed it with `npm run push:schedule`.
# ADMIN_TOKEN (the write secret) is set with:
#   npx wrangler secret put ADMIN_TOKEN --config worker/wrangler.toml
[[kv_namespaces]]
binding = "SCHEDULE_KV"
id = "82e4a8658a904367992885edf2c5272d"
