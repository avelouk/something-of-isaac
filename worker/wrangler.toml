# Cloudflare Worker + Durable Object for daily unique-player counts.
# Deploy from repo root: npm run deploy:stats (after npx wrangler login).
# See README "Daily stats" and worker/README.md.

name = "something-of-isaac-stats"
main = "src/index.ts"
compatibility_date = "2024-11-01"

[[durable_objects.bindings]]
name = "DAILY_STATS"
class_name = "DailyRoom"

# Workers Free plan: only SQLite-backed Durable Objects (not legacy key-value `new_classes`).
[[migrations]]
tag = "v1"
new_sqlite_classes = ["DailyRoom"]

# Hand-authored hint overrides keyed by UTC date. Create once with:
#   npx wrangler kv namespace create HINTS_KV --config worker/wrangler.toml
# then paste the returned id below. ADMIN_TOKEN (the write secret) is set with:
#   npx wrangler secret put ADMIN_TOKEN --config worker/wrangler.toml
[[kv_namespaces]]
binding = "HINTS_KV"
id = "000705aa95034b32ad8e37e596993e6f"
